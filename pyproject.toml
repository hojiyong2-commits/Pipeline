[tool.bandit]
skips = ["B101", "B110", "B603", "B310", "B311", "B404", "B324", "B605", "B607"]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
# E402: module-level imports not at top of file
#   _force_utf8_stdio() must run before any import that emits output — intentional design
# E731: lambda expression assignment — pre-existing style throughout pipeline.py
# E713: not in membership test — pre-existing one-off case at line 4514
# E701: multiple statements on one line — pre-existing style
# F541: f-string without placeholders — pre-existing throughout pipeline.py
# PLW2901: redefined-loop-name — detect loop variable shadowing outer scope names (BUG-20260512-9C67 recurrence prevention)
extend-select = ["PLW2901"]
ignore = ["E402", "E731", "E713", "E701", "F541", "F841"]

[tool.mypy]
ignore_missing_imports = true
# pipeline.py is a standalone script targeting Python 3.9 runtime;
# mypy is run under Python 3.12 so version mismatch warnings are expected.
# Pre-existing "Missing return statement" issues are in branches that call sys.exit()
# which mypy does not always treat as NoReturn in all code paths.
disable_error_code = ["return"]
