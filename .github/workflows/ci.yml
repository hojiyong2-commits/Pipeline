name: CI

# Acceptance-packet compatibility tokens kept for pipeline tests:
# 판단 정보 상태 / 정보 부족 / Normalize-DecisionText
# 기대 결과와 실제 결과 비교 / 업무 결과물이 따로 없는 규칙/문서 작업이면
# Convert-FileStatusToKorean / - ${statusKo}:
# "modified" { return "수정됨" } / "added" { return "새 파일" }
# 자동 검사: 통과 / 첨부파일 / 브랜치로 합치기

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 실행 모드 감지
        id: detect
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath ".pipeline/phase_attestation_request.json" -PathType Leaf) {
            "phase_request=true" >> $env:GITHUB_OUTPUT
            Write-Host "Phase attestation request found. Running lightweight phase validation only."
          } else {
            "phase_request=false" >> $env:GITHUB_OUTPUT
            Write-Host "No phase attestation request. Running full final CI."
          }

      - name: 파이썬 준비
        if: steps.detect.outputs.phase_request != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: 필요한 도구 설치
        if: steps.detect.outputs.phase_request != 'true'
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 자동 검사 실행
        if: steps.detect.outputs.phase_request != 'true'
        env:
          PIPELINE_NO_DASHBOARD: "1"
        run: python -m pytest -q

      - name: 자동 검사 증명 파일 만들기
        if: steps.detect.outputs.phase_request != 'true'
        shell: pwsh
        run: |
          $attestation = @{
            schema_version = 1
            attestation_type = "pipeline-ci-v1"
            repository = $env:GITHUB_REPOSITORY
            workflow = $env:GITHUB_WORKFLOW
            run_id = $env:GITHUB_RUN_ID
            run_attempt = $env:GITHUB_RUN_ATTEMPT
            commit_sha = "${{ github.event.pull_request.head.sha || github.sha }}"
            head_sha = "${{ github.event.pull_request.head.sha || github.sha }}"
            checkout_sha = $env:GITHUB_SHA
            ref = $env:GITHUB_REF
            event_name = $env:GITHUB_EVENT_NAME
            runner_os = $env:RUNNER_OS
            tree_sha = (git rev-parse 'HEAD^{tree}')
            tests = @{
              command = "python -m pytest -q"
              status = "PASS"
            }
            generated_at = (Get-Date).ToUniversalTime().ToString("o")
          }
          $attestation | ConvertTo-Json -Depth 8 | Set-Content -Path pipeline_attestation.json -Encoding UTF8

      - name: 최종 확인 안내 만들기
        if: steps.detect.outputs.phase_request != 'true' && github.event_name == 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $repo = $env:GITHUB_REPOSITORY
          $runUrl = "$env:GITHUB_SERVER_URL/$repo/actions/runs/$env:GITHUB_RUN_ID"
          $generatedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss 'UTC'")
          $prNumber = "${{ github.event.pull_request.number }}"
          $headSha = "${{ github.event.pull_request.head.sha }}"
          $baseRef = "${{ github.event.pull_request.base.ref }}"
          $headRef = "${{ github.event.pull_request.head.ref }}"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          function Get-MarkdownSection {
            param([string]$Markdown, [string[]]$Headers)
            if ([string]::IsNullOrWhiteSpace($Markdown)) { return "" }
            $lines = $Markdown -split "`r?`n"
            $start = -1
            $startLevel = 0
            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match '^(#{2,6})\s+(.+?)\s*$') {
                $title = $Matches[2].Trim()
                if ($Headers -contains $title) {
                  $start = $i + 1
                  $startLevel = $Matches[1].Length
                  break
                }
              }
            }
            if ($start -lt 0) { return "" }
            $end = $lines.Count
            for ($i = $start; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match '^(#{2,6})\s+(.+?)\s*$' -and $Matches[1].Length -le $startLevel) {
                $end = $i
                break
              }
            }
            if ($end -le $start) { return "" }
            return (($lines[$start..($end - 1)] -join "`n").Trim())
          }

          function Or-Fallback {
            param([string]$Text, [string]$Fallback)
            if ([string]::IsNullOrWhiteSpace($Text)) { return "- $Fallback" }
            return $Text.Trim()
          }

          $pr = Invoke-RestMethod -Method Get -Uri "$env:GITHUB_API_URL/repos/$repo/pulls/$prNumber" -Headers $headers
          $prTitle = [string]$pr.title
          $prBody = [string]$pr.body

          $summary = Or-Fallback `
            (Get-MarkdownSection -Markdown $prBody -Headers @("최종 판단 요약", "작업 요약", "변경 내용", "이번 요청과 완료 결과")) `
            "PR 본문에 작업 요약이 없습니다. 마지막 작업 담당자에게 쉬운 한국어 요약을 요청하세요."
          $result = Or-Fallback `
            (Get-MarkdownSection -Markdown $prBody -Headers @("사용자가 실제로 확인할 것", "사용자가 확인할 결과물", "확인할 결과물")) `
            "PR 본문에 결과물 링크나 로컬 경로가 없습니다. ACCEPT 전에 결과물 경로를 요청하세요."
          $expected = Or-Fallback `
            (Get-MarkdownSection -Markdown $prBody -Headers @("기대 결과와 실제 결과 비교", "기대/실제 결과")) `
            "PR 본문에 기대 결과와 실제 결과 비교가 없습니다. ACCEPT 전에 비교 설명을 요청하세요."
          $tradeoffs = Or-Fallback `
            (Get-MarkdownSection -Markdown $prBody -Headers @("중요한 선택과 트레이드오프", "트레이드오프", "선택과 이유")) `
            "PR 본문에 중요한 선택과 장단점 설명이 없습니다."
          $risks = Or-Fallback `
            (Get-MarkdownSection -Markdown $prBody -Headers @("남은 위험과 주의점", "남은 위험", "주의점")) `
            "별도 주의점이 보고되지 않았습니다."

          $files = @()
          $page = 1
          do {
            $batch = Invoke-RestMethod -Method Get -Uri "$env:GITHUB_API_URL/repos/$repo/pulls/$prNumber/files?per_page=100&page=$page" -Headers $headers
            if ($null -ne $batch) { $files += @($batch) }
            $page += 1
          } while ($batch.Count -eq 100)

          $fileLines = @()
          foreach ($file in ($files | Select-Object -First 40)) {
            $fileLines += "- $($file.status): ``$($file.filename)`` (+$($file.additions)/-$($file.deletions))"
          }
          if ($files.Count -gt 40) {
            $fileLines += "- ... 외 $($files.Count - 40)개 파일"
          }
          if ($fileLines.Count -eq 0) {
            $fileLines = @("- 변경 파일을 찾지 못했습니다.")
          }

          $packet = @"
          <!-- pipeline-human-acceptance-packet -->
          ## 최종 확인 안내

          이 댓글은 마지막 ACCEPT/REJECT 판단용입니다. 코드를 읽지 말고, 결과물이 요청과 맞는지만 확인하세요.
          이 안내는 CI가 끝날 때마다 새 댓글을 만들지 않고 같은 댓글을 갱신합니다.
          GitHub가 댓글 생성 시각을 오래전으로 보여도 아래 갱신 시각이 최신 기준입니다.

          ### 먼저 볼 결론

          - 자동 검사: 통과
          - 마지막 갱신: $generatedAt
          - PR 제목: $prTitle
          - 커밋: ``$headSha``
          - 작업 흐름: ``$headRef`` 브랜치를 ``$baseRef`` 브랜치로 합치기
          - 자동 검사와 첨부파일 보기: $runUrl

          ### 이번 요청과 완료 결과

          $summary

          ### 사용자가 실제로 확인할 것

          $result

          ### 기대 결과와 실제 결과 비교

          $expected

          ### 중요한 선택과 트레이드오프

          $tradeoffs

          ### 남은 위험과 주의점

          $risks

          ### 변경된 파일

          $($fileLines -join "`n")

          ### 결정 기준

          - 요청한 결과와 맞으면 승인(ACCEPT).
          - 결과가 없거나, 데이터/화면/파일이 틀리거나, 원하지 않은 변화가 보이면 거절(REJECT).
          - 위 정보가 부족하면 ACCEPT하지 말고 보완을 요청하세요.
          "@
          Set-Content -Path human_acceptance_packet.md -Value $packet -Encoding UTF8

      - name: 단계 증명 파일 만들기
        if: steps.detect.outputs.phase_request == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $requestPath = ".pipeline/phase_attestation_request.json"
          $request = Get-Content -Path $requestPath -Raw | ConvertFrom-Json
          $blockers = New-Object System.Collections.Generic.List[string]
          if ($request.schema_version -ne 1) { $blockers.Add("request schema_version must be 1") }
          if ($request.request_type -ne "pipeline-phase-attestation-request-v1") { $blockers.Add("request_type must be pipeline-phase-attestation-request-v1") }
          if ([string]::IsNullOrWhiteSpace($request.pipeline_id)) { $blockers.Add("pipeline_id is required") }
          if (@("pm", "dev", "qa", "build") -notcontains $request.phase) { $blockers.Add("phase must be one of pm/dev/qa/build") }

          $expectedAgents = @{
            pm = "pm-planner-agent"
            dev = "dev-agent"
            qa = "qa-agent"
            build = "build-agent"
          }
          $expectedRunPhases = @{
            pm = "pm_planner"
            dev = "dev"
            qa = "qa"
            build = "build"
          }

          function Test-Receipt {
            param(
              [object]$Run,
              [string]$ExpectedPhase,
              [string]$ExpectedAgent,
              [string]$ConsumedBy,
              [string]$Label
            )
            if ($null -eq $Run) {
              $blockers.Add("$Label receipt is required")
              return
            }
            if ($Run.phase -ne $ExpectedPhase) { $blockers.Add("$Label phase mismatch") }
            if ($Run.agent_id -ne $ExpectedAgent) { $blockers.Add("$Label agent_id mismatch") }
            if ($Run.status -ne "COMPLETED") { $blockers.Add("$Label status must be COMPLETED") }
            if ($Run.used_by_phase -ne $ConsumedBy) { $blockers.Add("$Label consumed phase mismatch") }
            $receiptPath = [string]$Run.receipt_path
            if ([string]::IsNullOrWhiteSpace($receiptPath) -or -not (Test-Path -LiteralPath $receiptPath -PathType Leaf)) {
              $blockers.Add("$Label receipt file missing: $receiptPath")
              return
            }
            $receiptHash = (Get-FileHash -LiteralPath $receiptPath -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($receiptHash -ne ([string]$Run.receipt_sha256).ToLowerInvariant()) {
              $blockers.Add("$Label receipt hash mismatch: $receiptPath")
            }
            $receipt = Get-Content -Path $receiptPath -Raw | ConvertFrom-Json
            if ($receipt.receipt_type -ne "agent-run-receipt-v1") { $blockers.Add("$Label receipt_type must be agent-run-receipt-v1") }
            if ($receipt.run_id -ne $Run.run_id) { $blockers.Add("$Label run_id mismatch") }
            if ($receipt.agent_id -ne $Run.agent_id) { $blockers.Add("$Label receipt agent_id mismatch") }
            if ($receipt.phase -ne $ExpectedPhase) { $blockers.Add("$Label receipt phase mismatch") }
          }

          $phase = [string]$request.phase
          Test-Receipt -Run $request.agent_run -ExpectedPhase $expectedRunPhases[$phase] -ExpectedAgent $expectedAgents[$phase] -ConsumedBy $phase -Label "agent_run"
          if ($phase -eq "pm") {
            Test-Receipt -Run $request.manager_run -ExpectedPhase "pipeline_manager" -ExpectedAgent "pipeline-manager-agent" -ConsumedBy "pm_manager" -Label "manager_run"
          }

          if ($null -ne $request.copied_evidence) {
            foreach ($item in @($request.copied_evidence)) {
              if ($null -eq $item) { continue }
              $path = [string]$item.path
              if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
                $blockers.Add("copied evidence missing: $path")
                continue
              }
              $actual = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
              if ($actual -ne ([string]$item.sha256).ToLowerInvariant()) {
                $blockers.Add("copied evidence hash mismatch: $path")
              }
            }
          }

          if ($null -ne $request.workspace_file_checks) {
            foreach ($item in @($request.workspace_file_checks)) {
              if ($null -eq $item) { continue }
              $path = [string]$item.path
              if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
                $blockers.Add("workspace file missing: $path")
                continue
              }
              $actual = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
              if ($actual -ne ([string]$item.sha256).ToLowerInvariant()) {
                $blockers.Add("workspace file hash mismatch: $path")
              }
            }
          }

          $validation = @{
            status = $(if ($blockers.Count -eq 0) { "PASS" } else { "FAIL" })
            blockers = @($blockers)
          }
          $attestation = @{
            schema_version = 1
            attestation_type = "pipeline-phase-v1"
            repository = $env:GITHUB_REPOSITORY
            workflow = $env:GITHUB_WORKFLOW
            run_id = $env:GITHUB_RUN_ID
            run_attempt = $env:GITHUB_RUN_ATTEMPT
            commit_sha = "${{ github.event.pull_request.head.sha || github.sha }}"
            head_sha = "${{ github.event.pull_request.head.sha || github.sha }}"
            checkout_sha = $env:GITHUB_SHA
            ref = $env:GITHUB_REF
            event_name = $env:GITHUB_EVENT_NAME
            runner_os = $env:RUNNER_OS
            pipeline_id = $request.pipeline_id
            phase = $request.phase
            request_sha256 = (Get-FileHash -LiteralPath $requestPath -Algorithm SHA256).Hash.ToLowerInvariant()
            request = $request
            validation = $validation
            generated_at = (Get-Date).ToUniversalTime().ToString("o")
          }
          $attestation | ConvertTo-Json -Depth 12 | Set-Content -Path phase_attestation.json -Encoding UTF8
          if ($blockers.Count -gt 0) {
            Write-Error ("Phase attestation failed: " + ($blockers -join "; "))
            exit 1
          }

      - name: 자동 검사 증명 파일 올리기
        if: steps.detect.outputs.phase_request != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-attestation
          path: pipeline_attestation.json

      - name: 최종 확인 안내 올리기
        if: steps.detect.outputs.phase_request != 'true' && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: 최종-확인-안내
          path: human_acceptance_packet.md

      - name: 단계 증명 파일 올리기
        if: steps.detect.outputs.phase_request == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-phase-attestation
          path: phase_attestation.json

      - name: PR에 최종 확인 안내 남기기
        if: steps.detect.outputs.phase_request != 'true' && github.event_name == 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $repo = $env:GITHUB_REPOSITORY
          $prNumber = "${{ github.event.pull_request.number }}"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $body = Get-Content -Path human_acceptance_packet.md -Raw
          $commentsUri = "$env:GITHUB_API_URL/repos/$repo/issues/$prNumber/comments"
          $comments = Invoke-RestMethod -Method Get -Uri $commentsUri -Headers $headers
          $existing = $comments | Where-Object { $_.body -like "*<!-- pipeline-human-acceptance-packet -->*" } | Select-Object -First 1
          $payload = @{ body = $body } | ConvertTo-Json -Depth 4
          if ($null -ne $existing) {
            $commentUri = "$env:GITHUB_API_URL/repos/$repo/issues/comments/$($existing.id)"
            Invoke-RestMethod -Method Patch -Uri $commentUri -Headers $headers -Body $payload -ContentType "application/json; charset=utf-8" | Out-Null
          } else {
            Invoke-RestMethod -Method Post -Uri $commentsUri -Headers $headers -Body $payload -ContentType "application/json; charset=utf-8" | Out-Null
          }
