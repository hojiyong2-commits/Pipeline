name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 파이썬 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 필요한 도구 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 구현 PR 위생 검사 (내부 산출물 오염 방지)
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'phase-attestation/')
        shell: pwsh
        env:
          PIPELINE_NO_DASHBOARD: "1"
        run: |
          $ErrorActionPreference = "Stop"
          $baseRef = "${{ github.event.pull_request.base.ref }}"
          if ([string]::IsNullOrWhiteSpace($baseRef)) { $baseRef = "main" }
          git fetch origin $baseRef --depth=50
          $baseSha = "${{ github.event.pull_request.base.sha }}"
          if ([string]::IsNullOrWhiteSpace($baseSha)) {
            $baseSha = git merge-base "origin/$baseRef" HEAD
          }
          $changedFiles = git diff --name-only "$baseSha" HEAD
          $forbiddenPatterns = @(
            '^\.pipeline[/\\]',
            '^pipeline_contracts[/\\]',
            '^pipeline_outputs[/\\]',
            '^pipeline_state.*\.json$',
            '^build_report\.xml$',
            '^qa_report\.xml$',
            '^codex_review_result\.json$',
            '^integration_report\.xml$',
            '^dev_handover\.xml$',
            '^step_plan\.xml$',
            '^architect_report\.xml$',
            'module_.*\.xml$',
            '^scope_manifest.*\.json$',
            '^preflight_report\.json$',
            '^failure_packet\.json$',
            '^manager_handoff\.xml$'
          )
          $violations = @()
          foreach ($file in $changedFiles) {
            foreach ($pattern in $forbiddenPatterns) {
              if ($file -match $pattern) {
                $violations += $file
                break
              }
            }
          }
          if ($violations.Count -gt 0) {
            Write-Error "[PIPELINE ERROR] 구현 PR에 내부 파이프라인 산출물이 포함되어 있습니다:`n$($violations -join [System.Environment]::NewLine)"
            exit 1
          }
          Write-Host "구현 PR 위생 검사 통과 — 내부 산출물 없음 ($($changedFiles.Count)개 파일 확인)"

      - name: 단계 PR 위생 검사 (preflight-pr)
        if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'phase-attestation/')
        shell: pwsh
        env:
          PIPELINE_NO_DASHBOARD: "1"
        run: |
          $ErrorActionPreference = "Stop"
          $reqPath = ".pipeline/phase_attestation_request.json"
          if (-not (Test-Path $reqPath)) {
            Write-Error "[PIPELINE ERROR] phase-attestation 브랜치에 .pipeline/phase_attestation_request.json이 없습니다."
            exit 1
          }
          $req = ConvertFrom-Json (Get-Content -Path $reqPath -Raw -Encoding UTF8)
          $phase = [string]$req.phase
          $pipelineId = [string]$req.pipeline_id
          if ([string]::IsNullOrWhiteSpace($phase)) {
            Write-Error "[PIPELINE ERROR] phase_attestation_request.json에 phase 필드가 없습니다."
            exit 1
          }
          $baseRef = "${{ github.event.pull_request.base.ref }}"
          if ([string]::IsNullOrWhiteSpace($baseRef)) { $baseRef = "main" }
          git fetch origin $baseRef --depth=50
          $baseSha = "${{ github.event.pull_request.base.sha }}"
          if ([string]::IsNullOrWhiteSpace($baseSha)) {
            $baseSha = git merge-base "origin/$baseRef" HEAD
            if ($LASTEXITCODE -ne 0) {
              git fetch --unshallow 2>$null
              $baseSha = git merge-base "origin/$baseRef" HEAD
            }
          }
          $env:GITHUB_BASE_SHA = $baseSha
          python pipeline.py gates preflight-pr --phase $phase --pipeline-id $pipelineId --request-file $reqPath

      - name: CLI Evidence Contract 검사
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'phase-attestation/')
        env:
          PIPELINE_NO_DASHBOARD: "1"
        run: python tools/check_cli_evidence_contract.py --path tests

      - name: 자동 검사 실행
        env:
          PIPELINE_NO_DASHBOARD: "1"
        run: python -m pytest -q

      - name: 프로토콜 일치성 검사
        # IMP-20260520-D0BB: PR body / 최종 확인 안내 / CI 상태 일치 검증.
        # consistency 실패가 CI 전체(및 phase attestation)를 막지 않도록
        # continue-on-error로 두고, 실제 hard block은 gates accept 내부에서 수행.
        if: ${{ github.event_name == 'pull_request' && !github.event.pull_request.draft }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: python pipeline.py gates consistency --repo ${{ github.repository }} --pr ${{ github.event.pull_request.number }}

      - name: 자동 검사 증명 파일 만들기
        if: success()
        shell: pwsh
        run: |
          $attestation = @{
            schema_version = 1
            attestation_type = "pipeline-ci-v1"
            repository = $env:GITHUB_REPOSITORY
            workflow = $env:GITHUB_WORKFLOW
            run_id = $env:GITHUB_RUN_ID
            run_attempt = $env:GITHUB_RUN_ATTEMPT
            commit_sha = "${{ github.event.pull_request.head.sha || github.sha }}"
            head_sha = "${{ github.event.pull_request.head.sha || github.sha }}"
            checkout_sha = $env:GITHUB_SHA
            ref = $env:GITHUB_REF
            event_name = $env:GITHUB_EVENT_NAME
            runner_os = $env:RUNNER_OS
            tree_sha = (git rev-parse 'HEAD^{tree}')
            tests = @{
              command = "python -m pytest -q"
              status = "PASS"
            }
            generated_at = (Get-Date).ToUniversalTime().ToString("o")
          }
          $attestation | ConvertTo-Json -Depth 8 | Set-Content -Path pipeline_attestation.json -Encoding UTF8

      - name: 최종 확인 안내 만들기
        if: success() && github.event_name == 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $repo = $env:GITHUB_REPOSITORY
          $runUrl = "$env:GITHUB_SERVER_URL/$repo/actions/runs/$env:GITHUB_RUN_ID"
          $generatedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss 'UTC'")
          $prNumber = "${{ github.event.pull_request.number }}"
          $headSha = "${{ github.event.pull_request.head.sha }}"
          $baseRef = "${{ github.event.pull_request.base.ref }}"
          $headRef = "${{ github.event.pull_request.head.ref }}"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $prUri = "$env:GITHUB_API_URL/repos/$repo/pulls/$prNumber"
          $pr = Invoke-RestMethod -Method Get -Uri $prUri -Headers $headers
          $prTitle = [string]$pr.title
          $prBody = [string]$pr.body
          $prBody = $prBody.TrimStart([char]0xFEFF)

          function Get-MarkdownSection {
            param(
              [string]$Markdown,
              [string[]]$Headers
            )
            if ([string]::IsNullOrWhiteSpace($Markdown)) { return "" }
            $lines = $Markdown -split "`r?`n"
            $start = -1
            $startLevel = 0
            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match '^(#{2,6})\s+(.+?)\s*$') {
                $title = $Matches[2].Trim()
                if ($Headers -contains $title) {
                  $start = $i + 1
                  $startLevel = $Matches[1].Length
                  break
                }
              }
            }
            if ($start -lt 0) { return "" }
            $end = $lines.Count
            for ($i = $start; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match '^(#{2,6})\s+(.+?)\s*$') {
                $level = $Matches[1].Length
                if ($level -le $startLevel) {
                  $end = $i
                  break
                }
              }
            }
            if ($end -le $start) { return "" }
            return (($lines[$start..($end - 1)] -join "`n").Trim())
          }

          function Format-DecisionBlock {
            param(
              [string]$Text,
              [string]$Fallback
            )
            $cleaned = Normalize-DecisionText -Text $Text
            if ([string]::IsNullOrWhiteSpace($cleaned)) {
              return "- $Fallback"
            }
            return $cleaned
          }

          function Normalize-DecisionText {
            param([string]$Text)
            if ([string]::IsNullOrWhiteSpace($Text)) { return "" }
            $placeholderPatterns = @(
              '^\s*#{2,6}\s+.*$',
              '^\s*-\s*$',
              '^\s*-\s*(요청한 일|실제 완료된 일|결과 링크/경로|스크린샷/첨부파일/엑셀/EXE|결과물이 없는 규칙/문서 작업이면 확인할 요약|기대 결과|실제 결과|선택|장점|단점|추가 개선 포인트)\s*:?\s*$',
              '^\s*-\s*\[\s*\]\s*.*$'
            )
            $kept = New-Object System.Collections.Generic.List[string]
            foreach ($line in ($Text -split "`r?`n")) {
              $trimmed = $line.Trim()
              if ([string]::IsNullOrWhiteSpace($trimmed)) { continue }
              $isPlaceholder = $false
              foreach ($pattern in $placeholderPatterns) {
                if ($trimmed -match $pattern) {
                  $isPlaceholder = $true
                  break
                }
              }
              if (-not $isPlaceholder) {
                $kept.Add($line)
              }
            }
            return (($kept -join "`n").Trim())
          }

          $workSummary = Get-MarkdownSection -Markdown $prBody -Headers @("최종 판단 요약", "작업 요약", "변경 내용", "이번 요청과 완료 결과")
          $resultToCheck = Get-MarkdownSection -Markdown $prBody -Headers @("사용자가 확인할 결과물", "확인할 결과물", "사용자가 보게 되는 흐름")
          $expectedActual = Get-MarkdownSection -Markdown $prBody -Headers @("기대 결과와 실제 결과", "기대/실제 결과")
          $tradeoffNotes = Get-MarkdownSection -Markdown $prBody -Headers @("중요한 선택과 트레이드오프", "트레이드오프", "선택과 이유")
          $riskNotes = Get-MarkdownSection -Markdown $prBody -Headers @("남은 위험과 주의점", "남은 위험", "주의할 점")
          $improvementNotes = Get-MarkdownSection -Markdown $prBody -Headers @("추가 개선 포인트", "앞으로 개선할 점", "후속 개선")
          $validationNotes = Get-MarkdownSection -Markdown $prBody -Headers @("검증", "자동 검증", "테스트")

          $missingDecisionInfo = New-Object System.Collections.Generic.List[string]
          if ([string]::IsNullOrWhiteSpace((Normalize-DecisionText -Text $workSummary))) { $missingDecisionInfo.Add("작업 요약") }
          if ([string]::IsNullOrWhiteSpace((Normalize-DecisionText -Text $resultToCheck))) { $missingDecisionInfo.Add("사용자가 확인할 결과물") }
          if ([string]::IsNullOrWhiteSpace((Normalize-DecisionText -Text $expectedActual))) { $missingDecisionInfo.Add("기대 결과와 실제 결과") }
          if ([string]::IsNullOrWhiteSpace((Normalize-DecisionText -Text $tradeoffNotes))) { $missingDecisionInfo.Add("중요한 선택과 트레이드오프") }
          if ($missingDecisionInfo.Count -eq 0) {
            $decisionReadiness = "판단 가능"
            $decisionAdvice = "아래 요약과 결과물이 요청과 맞으면 승인(ACCEPT)하면 됩니다."
          } else {
            $decisionReadiness = "정보 부족"
            $decisionAdvice = "아래 항목이 비어 있습니다: $($missingDecisionInfo -join ', '). ACCEPT 전에 마지막 작업 담당자에게 보완을 요청하세요."
          }

          $workSummaryBlock = Format-DecisionBlock -Text $workSummary -Fallback "PR 본문에 작업 요약이 없습니다. ACCEPT 전에 담당자에게 쉬운 한국어 요약을 요청하세요."
          $resultToCheckBlock = Format-DecisionBlock -Text $resultToCheck -Fallback "PR 본문에 사용자가 열어볼 결과물 링크/경로가 없습니다. ACCEPT 전에 결과물 경로를 요청하세요."
          $expectedActualBlock = Format-DecisionBlock -Text $expectedActual -Fallback "PR 본문에 기대 결과와 실제 결과 비교가 없습니다. ACCEPT 전에 비교 내용을 요청하세요."
          $tradeoffNotesBlock = Format-DecisionBlock -Text $tradeoffNotes -Fallback "PR 본문에 중요한 선택과 트레이드오프가 없습니다. ACCEPT 전에 장점/단점 설명을 요청하세요."
          $riskNotesBlock = Format-DecisionBlock -Text $riskNotes -Fallback "별도 주의점이 적혀 있지 않습니다."
          $improvementNotesBlock = Format-DecisionBlock -Text $improvementNotes -Fallback "별도 후속 개선 포인트가 적혀 있지 않습니다."
          $validationNotesBlock = Format-DecisionBlock -Text $validationNotes -Fallback "PR 본문 검증 요약이 없습니다. 아래 GitHub 자동 검사 통과 여부만 확인하세요."

          $files = @()
          $page = 1
          do {
            $uri = "$env:GITHUB_API_URL/repos/$repo/pulls/$prNumber/files?per_page=100&page=$page"
            $batch = Invoke-RestMethod -Method Get -Uri $uri -Headers $headers
            if ($null -ne $batch) { $files += @($batch) }
            $page += 1
          } while ($batch.Count -eq 100)

          $sensitivePatterns = @(
            '^tests/oracles/',
            '^tests/',
            '^test_.*\.py$',
            '^.*_test\.py$',
            '^pipeline\.py$',
            '^CLAUDE\.md$',
            '^\.claude/agents/',
            '^\.github/CODEOWNERS$',
            '^\.github/pull_request_template\.md$',
            '^\.github/workflows/'
          )
          $sensitive = New-Object System.Collections.Generic.List[string]
          foreach ($file in $files) {
            $name = [string]$file.filename
            foreach ($pattern in $sensitivePatterns) {
              if ($name -match $pattern) {
                $sensitive.Add($name)
                break
              }
            }
          }

          function Convert-FileStatusToKorean {
            param([string]$Status)
            switch ($Status) {
              "added" { return "새 파일" }
              "modified" { return "수정됨" }
              "removed" { return "삭제됨" }
              "deleted" { return "삭제됨" }
              "renamed" { return "이름 변경" }
              "copied" { return "복사됨" }
              "changed" { return "변경됨" }
              default {
                if ([string]::IsNullOrWhiteSpace($Status)) { return "변경됨" }
                return "변경됨"
              }
            }
          }

          $fileLines = @()
          foreach ($file in ($files | Select-Object -First 30)) {
            $statusKo = Convert-FileStatusToKorean -Status ([string]$file.status)
            $fileLines += "- ${statusKo}: ``$($file.filename)`` (추가 $($file.additions)줄, 삭제 $($file.deletions)줄)"
          }
          if ($files.Count -gt 30) {
            $fileLines += "- ... 외 $($files.Count - 30)개 파일"
          }
          if ($fileLines.Count -eq 0) {
            $fileLines = @("- GitHub가 변경 파일을 찾지 못했습니다.")
          }

          $sensitiveLines = @()
          if ($sensitive.Count -eq 0) {
            $sensitiveLines = @("- 없음")
          } else {
            foreach ($name in $sensitive) {
              $sensitiveLines += "- ``$name``"
            }
          }

          # 파이프라인 메트릭 수집 (pipeline_state.json 없으면 '확인 불가')
          $metricsOutput = ""
          try {
            $env:PIPELINE_NO_DASHBOARD = "1"
            $rawMetrics = & python pipeline.py metrics status 2>&1
            if ($LASTEXITCODE -eq 0 -and $null -ne $rawMetrics) {
              $metricsOutput = ($rawMetrics -join "`n").Trim()
            }
          } catch { }
          if ([string]::IsNullOrWhiteSpace($metricsOutput)) {
            $metricsOutput = "(파이프라인 상태 파일이 없어 메트릭을 확인할 수 없습니다.)"
          }

          $packet = @"
          <!-- pipeline-human-acceptance-packet -->
          ## 최종 확인 안내

          이 댓글은 마지막 승인/거절 판단용입니다. 코드를 읽지 말고, **아래 결과 요약과 실제 결과물**이 요청과 맞는지만 확인하세요.
          이 안내는 CI가 끝날 때마다 새 댓글을 만들지 않고 같은 댓글을 갱신합니다. GitHub가 댓글 생성 시각을 오래전으로 보여도 아래 갱신 시각이 최신 기준입니다.

          ### 먼저 볼 결론

          - 판단 정보 상태: **$decisionReadiness**
          - 안내 — $decisionAdvice
          - PR 제목: $prTitle

          ### 이번 요청과 완료 결과

          $workSummaryBlock

          ### 사용자가 실제로 확인할 것

          $resultToCheckBlock

          ### 기대 결과와 실제 결과 비교

          $expectedActualBlock

          ### 중요한 선택과 트레이드오프

          $tradeoffNotesBlock

          ### 남은 위험과 주의점

          $riskNotesBlock

          ### 추가 개선 포인트

          $improvementNotesBlock

          ### GitHub가 자동으로 확인한 것

          - 자동 검사: 통과
          - 마지막 갱신: $generatedAt
          - 필수 검사 이름: ``tests``
          - 실제로 실행한 검사: ``python -m pytest -q``
          - 이번 변경 번호: ``$headSha``
          - 작업 흐름: ``$headRef`` 브랜치를 ``$baseRef`` 브랜치로 합치기
          - 자동 검사 결과와 첨부파일 보기: $runUrl

          ### 작업 담당자가 보고한 검증

          $validationNotesBlock

          ### 변경된 파일

          $($fileLines -join "`n")

          ### 사용자가 확인해야 할 중요 파일 변경

          $($sensitiveLines -join "`n")

          ### 승인 전에 볼 것

          - 위 **사용자가 실제로 확인할 것**에 적힌 결과 링크/경로를 여세요.
          - 첨부파일이 있으면 위 자동 검사 링크에서 여세요.
          - 화면, 엑셀, EXE, 생성 파일이 **기대 결과와 실제 결과 비교**와 맞는지 확인하세요.
          - 업무 결과물이 따로 없는 규칙/문서 작업이면, **이번 요청과 완료 결과**, 자동 검사 통과 여부, 중요 파일 변경 목록을 확인하세요.
          - 코드 내용을 직접 이해하려고 애쓰지 않아도 됩니다. 요청한 결과가 나왔는지, 원하지 않은 결과물이 섞이지 않았는지만 보면 됩니다.
          - 결과가 틀리거나 빠졌으면 거절(REJECT)을 고르고 짧게 이유를 적으세요.

          ### 결정 기준

          - 판단 정보 상태가 **판단 가능**이고, 결과물이 요청과 맞으면 승인(ACCEPT).
          - 판단 정보 상태가 **정보 부족**이면 ACCEPT하지 말고 보완 요청 또는 거절(REJECT).
          - 결과가 없거나, 데이터/화면이 틀리거나, 원하지 않은 파일이 섞였으면 거절(REJECT).

          ## 소요 시간 요약

          $metricsOutput
          "@
          Set-Content -Path human_acceptance_packet.md -Value $packet -Encoding UTF8

      - name: 단계 증명 파일 만들기
        if: success() && hashFiles('.pipeline/phase_attestation_request.json') != ''
        shell: pwsh
        run: |
          $requestPath = ".pipeline/phase_attestation_request.json"
          $request = Get-Content -Path $requestPath -Raw | ConvertFrom-Json
          $blockers = New-Object System.Collections.Generic.List[string]
          if ($request.schema_version -ne 1) {
            $blockers.Add("request schema_version must be 1")
          }
          if ($request.request_type -ne "pipeline-phase-attestation-request-v1") {
            $blockers.Add("request_type must be pipeline-phase-attestation-request-v1")
          }
          if ([string]::IsNullOrWhiteSpace($request.pipeline_id)) {
            $blockers.Add("pipeline_id is required")
          }
          if (@("pm", "dev", "qa", "build") -notcontains $request.phase) {
            $blockers.Add("phase must be one of pm/dev/qa/build")
          }
          # PM split: pm-planner-agent (new) or pm-agent (legacy) both accepted
          $expectedAgents = @{
            pm = @("pm-agent", "pm-planner-agent")
            dev = @("dev-agent")
            qa = @("qa-agent")
            build = @("build-agent")
          }
          # PM split: agent_run.phase may be "pm_planner" when request.phase is "pm"
          $allowedAgentPhases = @{
            pm = @("pm", "pm_planner")
            dev = @("dev")
            qa = @("qa")
            build = @("build")
          }
          if ($null -eq $request.agent_run) {
            $blockers.Add("agent_run receipt is required")
          } else {
            $reqPhase = [string]$request.phase
            if ($allowedAgentPhases[$reqPhase] -notcontains $request.agent_run.phase) {
              $blockers.Add("agent_run phase mismatch")
            }
            if ($expectedAgents[$reqPhase] -notcontains $request.agent_run.agent_id) {
              $blockers.Add("agent_run agent_id mismatch")
            }
            if ($request.agent_run.status -ne "COMPLETED") {
              $blockers.Add("agent_run status must be COMPLETED")
            }
            if ($request.agent_run.used_by_phase -ne $request.phase) {
              $blockers.Add("agent_run must be consumed by the same phase")
            }
            $receiptPath = [string]$request.agent_run.receipt_path
            if ([string]::IsNullOrWhiteSpace($receiptPath) -or -not (Test-Path -LiteralPath $receiptPath -PathType Leaf)) {
              $blockers.Add("agent receipt file missing: $receiptPath")
            } else {
              $receiptHash = (Get-FileHash -LiteralPath $receiptPath -Algorithm SHA256).Hash.ToLowerInvariant()
              if ($receiptHash -ne ([string]$request.agent_run.receipt_sha256).ToLowerInvariant()) {
                $blockers.Add("agent receipt hash mismatch: $receiptPath")
              }
              $receipt = Get-Content -Path $receiptPath -Raw | ConvertFrom-Json
              if ($receipt.receipt_type -ne "agent-run-receipt-v1") {
                $blockers.Add("agent receipt_type must be agent-run-receipt-v1")
              }
              if ($receipt.run_id -ne $request.agent_run.run_id) {
                $blockers.Add("agent receipt run_id mismatch")
              }
              if ($receipt.agent_id -ne $request.agent_run.agent_id) {
                $blockers.Add("agent receipt agent_id mismatch")
              }
              # Compare receipt.phase to agent_run.phase (not request.phase) to support PM split
              if ($receipt.phase -ne $request.agent_run.phase) {
                $blockers.Add("agent receipt phase mismatch")
              }
            }
          }

          if ($null -ne $request.copied_evidence) {
            foreach ($item in @($request.copied_evidence)) {
              if ($null -eq $item) { continue }
              $path = [string]$item.path
              if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
                $blockers.Add("copied evidence missing: $path")
                continue
              }
              $actual = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
              if ($actual -ne ([string]$item.sha256).ToLowerInvariant()) {
                $blockers.Add("copied evidence hash mismatch: $path")
              }
            }
          }

          if ($null -ne $request.workspace_file_checks) {
            foreach ($item in @($request.workspace_file_checks)) {
              if ($null -eq $item) { continue }
              $path = [string]$item.path
              if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
                $blockers.Add("workspace file missing: $path")
                continue
              }
              $actual = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
              if ($actual -ne ([string]$item.sha256).ToLowerInvariant()) {
                $blockers.Add("workspace file hash mismatch: $path")
              }
            }
          }

          $validation = @{
            status = $(if ($blockers.Count -eq 0) { "PASS" } else { "FAIL" })
            blockers = @($blockers)
          }
          $attestation = @{
            schema_version = 1
            attestation_type = "pipeline-phase-v1"
            repository = $env:GITHUB_REPOSITORY
            workflow = $env:GITHUB_WORKFLOW
            run_id = $env:GITHUB_RUN_ID
            run_attempt = $env:GITHUB_RUN_ATTEMPT
            commit_sha = "${{ github.event.pull_request.head.sha || github.sha }}"
            head_sha = "${{ github.event.pull_request.head.sha || github.sha }}"
            checkout_sha = $env:GITHUB_SHA
            ref = $env:GITHUB_REF
            event_name = $env:GITHUB_EVENT_NAME
            runner_os = $env:RUNNER_OS
            pipeline_id = $request.pipeline_id
            phase = $request.phase
            request_sha256 = (Get-FileHash -LiteralPath $requestPath -Algorithm SHA256).Hash.ToLowerInvariant()
            request = $request
            validation = $validation
            generated_at = (Get-Date).ToUniversalTime().ToString("o")
          }
          $attestation | ConvertTo-Json -Depth 12 | Set-Content -Path phase_attestation.json -Encoding UTF8
          if ($blockers.Count -gt 0) {
            Write-Error ("Phase attestation failed: " + ($blockers -join "; "))
            exit 1
          }

      - name: 자동 검사 증명 파일 올리기
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-attestation
          path: pipeline_attestation.json

      - name: 최종 확인 안내 올리기
        if: success() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: 최종-확인-안내
          path: human_acceptance_packet.md

      - name: 단계 증명 파일 올리기
        if: success() && hashFiles('phase_attestation.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-phase-attestation
          path: phase_attestation.json

      - name: PR에 최종 확인 안내 남기기
        if: success() && github.event_name == 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $repo = $env:GITHUB_REPOSITORY
          $prNumber = "${{ github.event.pull_request.number }}"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $body = Get-Content -Path human_acceptance_packet.md -Raw
          $commentsUri = "$env:GITHUB_API_URL/repos/$repo/issues/$prNumber/comments"
          $comments = Invoke-RestMethod -Method Get -Uri $commentsUri -Headers $headers
          $existing = $comments | Where-Object { $_.body -like "*<!-- pipeline-human-acceptance-packet -->*" } | Select-Object -First 1
          $payload = @{ body = $body } | ConvertTo-Json -Depth 4
          if ($null -ne $existing) {
            $commentUri = "$env:GITHUB_API_URL/repos/$repo/issues/comments/$($existing.id)"
            Invoke-RestMethod -Method Patch -Uri $commentUri -Headers $headers -Body $payload -ContentType "application/json; charset=utf-8" | Out-Null
          } else {
            Invoke-RestMethod -Method Post -Uri $commentsUri -Headers $headers -Body $payload -ContentType "application/json; charset=utf-8" | Out-Null
          }
