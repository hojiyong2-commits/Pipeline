name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          PIPELINE_NO_DASHBOARD: "1"
        run: python -m pytest -q

      - name: Create CI attestation
        if: success()
        shell: pwsh
        run: |
          $attestation = @{
            schema_version = 1
            attestation_type = "pipeline-ci-v1"
            repository = $env:GITHUB_REPOSITORY
            workflow = $env:GITHUB_WORKFLOW
            run_id = $env:GITHUB_RUN_ID
            run_attempt = $env:GITHUB_RUN_ATTEMPT
            commit_sha = "${{ github.event.pull_request.head.sha || github.sha }}"
            head_sha = "${{ github.event.pull_request.head.sha || github.sha }}"
            checkout_sha = $env:GITHUB_SHA
            ref = $env:GITHUB_REF
            event_name = $env:GITHUB_EVENT_NAME
            runner_os = $env:RUNNER_OS
            tree_sha = (git rev-parse 'HEAD^{tree}')
            tests = @{
              command = "python -m pytest -q"
              status = "PASS"
            }
            generated_at = (Get-Date).ToUniversalTime().ToString("o")
          }
          $attestation | ConvertTo-Json -Depth 8 | Set-Content -Path pipeline_attestation.json -Encoding UTF8

      - name: Create human acceptance packet
        if: success() && github.event_name == 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $repo = $env:GITHUB_REPOSITORY
          $runUrl = "$env:GITHUB_SERVER_URL/$repo/actions/runs/$env:GITHUB_RUN_ID"
          $prNumber = "${{ github.event.pull_request.number }}"
          $headSha = "${{ github.event.pull_request.head.sha }}"
          $baseRef = "${{ github.event.pull_request.base.ref }}"
          $headRef = "${{ github.event.pull_request.head.ref }}"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $files = @()
          $page = 1
          do {
            $uri = "$env:GITHUB_API_URL/repos/$repo/pulls/$prNumber/files?per_page=100&page=$page"
            $batch = Invoke-RestMethod -Method Get -Uri $uri -Headers $headers
            if ($null -ne $batch) { $files += @($batch) }
            $page += 1
          } while ($batch.Count -eq 100)

          $sensitivePatterns = @(
            '^tests/oracles/',
            '^tests/',
            '^test_.*\.py$',
            '^.*_test\.py$',
            '^pipeline\.py$',
            '^CLAUDE\.md$',
            '^\.claude/agents/',
            '^\.github/CODEOWNERS$',
            '^\.github/pull_request_template\.md$',
            '^\.github/workflows/'
          )
          $sensitive = New-Object System.Collections.Generic.List[string]
          foreach ($file in $files) {
            $name = [string]$file.filename
            foreach ($pattern in $sensitivePatterns) {
              if ($name -match $pattern) {
                $sensitive.Add($name)
                break
              }
            }
          }

          $fileLines = @()
          foreach ($file in ($files | Select-Object -First 30)) {
            $fileLines += "- ``$($file.status)`` ``$($file.filename)`` (+$($file.additions)/-$($file.deletions))"
          }
          if ($files.Count -gt 30) {
            $fileLines += "- ... and $($files.Count - 30) more files"
          }
          if ($fileLines.Count -eq 0) {
            $fileLines = @("- No changed files reported by GitHub.")
          }

          $sensitiveLines = @()
          if ($sensitive.Count -eq 0) {
            $sensitiveLines = @("- None")
          } else {
            foreach ($name in $sensitive) {
              $sensitiveLines += "- ``$name``"
            }
          }

          $packet = @"
          <!-- pipeline-human-acceptance-packet -->
          ## Human Acceptance Packet

          This packet is for final ACCEPT/REJECT. You should judge the visible result and requested behavior, not read the code.

          ### What GitHub verified

          - CI: PASS
          - Required check: ``tests``
          - Command: ``python -m pytest -q``
          - Commit: ``$headSha``
          - Branch: ``$headRef`` -> ``$baseRef``
          - Actions run / artifacts: $runUrl

          ### Changed files

          $($fileLines -join "`n")

          ### User-owned / trust-root files touched

          $($sensitiveLines -join "`n")

          ### What to inspect before ACCEPT

          - Open the result link/path provided by the final agent.
          - If an artifact was uploaded, open it from the Actions run above.
          - Check the output, screenshot, workbook, EXE, or generated file against the original request.
          - If the visible result is wrong, choose REJECT and give the shortest reason.

          ### Decision

          - ACCEPT only when the result matches the request.
          - REJECT when the result is missing, visually wrong, has wrong data, or includes unexpected artifacts.
          "@
          Set-Content -Path human_acceptance_packet.md -Value $packet -Encoding UTF8

      - name: Create phase CI attestation
        if: success() && hashFiles('.pipeline/phase_attestation_request.json') != ''
        shell: pwsh
        run: |
          $requestPath = ".pipeline/phase_attestation_request.json"
          $request = Get-Content -Path $requestPath -Raw | ConvertFrom-Json
          $blockers = New-Object System.Collections.Generic.List[string]
          if ($request.schema_version -ne 1) {
            $blockers.Add("request schema_version must be 1")
          }
          if ($request.request_type -ne "pipeline-phase-attestation-request-v1") {
            $blockers.Add("request_type must be pipeline-phase-attestation-request-v1")
          }
          if ([string]::IsNullOrWhiteSpace($request.pipeline_id)) {
            $blockers.Add("pipeline_id is required")
          }
          if (@("pm", "dev", "qa", "build") -notcontains $request.phase) {
            $blockers.Add("phase must be one of pm/dev/qa/build")
          }
          $expectedAgents = @{
            pm = "pm-agent"
            dev = "dev-agent"
            qa = "qa-agent"
            build = "build-agent"
          }
          if ($null -eq $request.agent_run) {
            $blockers.Add("agent_run receipt is required")
          } else {
            if ($request.agent_run.phase -ne $request.phase) {
              $blockers.Add("agent_run phase mismatch")
            }
            if ($request.agent_run.agent_id -ne $expectedAgents[[string]$request.phase]) {
              $blockers.Add("agent_run agent_id mismatch")
            }
            if ($request.agent_run.status -ne "COMPLETED") {
              $blockers.Add("agent_run status must be COMPLETED")
            }
            if ($request.agent_run.used_by_phase -ne $request.phase) {
              $blockers.Add("agent_run must be consumed by the same phase")
            }
            $receiptPath = [string]$request.agent_run.receipt_path
            if ([string]::IsNullOrWhiteSpace($receiptPath) -or -not (Test-Path -LiteralPath $receiptPath -PathType Leaf)) {
              $blockers.Add("agent receipt file missing: $receiptPath")
            } else {
              $receiptHash = (Get-FileHash -LiteralPath $receiptPath -Algorithm SHA256).Hash.ToLowerInvariant()
              if ($receiptHash -ne ([string]$request.agent_run.receipt_sha256).ToLowerInvariant()) {
                $blockers.Add("agent receipt hash mismatch: $receiptPath")
              }
              $receipt = Get-Content -Path $receiptPath -Raw | ConvertFrom-Json
              if ($receipt.receipt_type -ne "agent-run-receipt-v1") {
                $blockers.Add("agent receipt_type must be agent-run-receipt-v1")
              }
              if ($receipt.run_id -ne $request.agent_run.run_id) {
                $blockers.Add("agent receipt run_id mismatch")
              }
              if ($receipt.agent_id -ne $request.agent_run.agent_id) {
                $blockers.Add("agent receipt agent_id mismatch")
              }
              if ($receipt.phase -ne $request.phase) {
                $blockers.Add("agent receipt phase mismatch")
              }
            }
          }

          if ($null -ne $request.copied_evidence) {
            foreach ($item in @($request.copied_evidence)) {
              if ($null -eq $item) { continue }
              $path = [string]$item.path
              if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
                $blockers.Add("copied evidence missing: $path")
                continue
              }
              $actual = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
              if ($actual -ne ([string]$item.sha256).ToLowerInvariant()) {
                $blockers.Add("copied evidence hash mismatch: $path")
              }
            }
          }

          if ($null -ne $request.workspace_file_checks) {
            foreach ($item in @($request.workspace_file_checks)) {
              if ($null -eq $item) { continue }
              $path = [string]$item.path
              if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
                $blockers.Add("workspace file missing: $path")
                continue
              }
              $actual = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
              if ($actual -ne ([string]$item.sha256).ToLowerInvariant()) {
                $blockers.Add("workspace file hash mismatch: $path")
              }
            }
          }

          $validation = @{
            status = $(if ($blockers.Count -eq 0) { "PASS" } else { "FAIL" })
            blockers = @($blockers)
          }
          $attestation = @{
            schema_version = 1
            attestation_type = "pipeline-phase-v1"
            repository = $env:GITHUB_REPOSITORY
            workflow = $env:GITHUB_WORKFLOW
            run_id = $env:GITHUB_RUN_ID
            run_attempt = $env:GITHUB_RUN_ATTEMPT
            commit_sha = "${{ github.event.pull_request.head.sha || github.sha }}"
            head_sha = "${{ github.event.pull_request.head.sha || github.sha }}"
            checkout_sha = $env:GITHUB_SHA
            ref = $env:GITHUB_REF
            event_name = $env:GITHUB_EVENT_NAME
            runner_os = $env:RUNNER_OS
            pipeline_id = $request.pipeline_id
            phase = $request.phase
            request_sha256 = (Get-FileHash -LiteralPath $requestPath -Algorithm SHA256).Hash.ToLowerInvariant()
            request = $request
            validation = $validation
            generated_at = (Get-Date).ToUniversalTime().ToString("o")
          }
          $attestation | ConvertTo-Json -Depth 12 | Set-Content -Path phase_attestation.json -Encoding UTF8
          if ($blockers.Count -gt 0) {
            Write-Error ("Phase attestation failed: " + ($blockers -join "; "))
            exit 1
          }

      - name: Upload CI attestation
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-attestation
          path: pipeline_attestation.json

      - name: Upload human acceptance packet
        if: success() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: human-acceptance-packet
          path: human_acceptance_packet.md

      - name: Upload phase CI attestation
        if: success() && hashFiles('phase_attestation.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-phase-attestation
          path: phase_attestation.json

      - name: Comment human acceptance packet
        if: success() && github.event_name == 'pull_request'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $repo = $env:GITHUB_REPOSITORY
          $prNumber = "${{ github.event.pull_request.number }}"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $body = Get-Content -Path human_acceptance_packet.md -Raw
          $commentsUri = "$env:GITHUB_API_URL/repos/$repo/issues/$prNumber/comments"
          $comments = Invoke-RestMethod -Method Get -Uri $commentsUri -Headers $headers
          $existing = $comments | Where-Object { $_.body -like "*<!-- pipeline-human-acceptance-packet -->*" } | Select-Object -First 1
          $payload = @{ body = $body } | ConvertTo-Json -Depth 4
          if ($null -ne $existing) {
            Invoke-RestMethod -Method Patch -Uri "$commentsUri/$($existing.id)" -Headers $headers -Body $payload -ContentType "application/json" | Out-Null
          } else {
            Invoke-RestMethod -Method Post -Uri $commentsUri -Headers $headers -Body $payload -ContentType "application/json" | Out-Null
          }
